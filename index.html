<!DOCTYPE html>
<html lang="zh-HK">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>六合彩研究工具 — 江恩螺旋方圖 ＆ 范氏圖表</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --teal:#00d4c8; --teal-light:#7ffff4; --white:#fff;
  --card-bg:rgba(255,255,255,0.10); --card-border:rgba(255,255,255,0.20);
}
body {
  min-height:100vh;
  background:linear-gradient(135deg,#3d1578 0%,#6b2fa0 30%,#9b3fc0 55%,#5b8fce 80%,#2ad4c8 100%);
  font-family:'Helvetica Neue',Arial,'PingFang TC','Microsoft JhengHei',sans-serif;
  display:flex; flex-direction:column; align-items:center;
  padding:32px 16px 48px; overflow-x:hidden; position:relative;
}
#sparkle-canvas { position:fixed; inset:0; pointer-events:none; z-index:0; }
.content { position:relative; z-index:1; width:100%; max-width:480px; display:flex; flex-direction:column; align-items:center; gap:20px; }

.hero { text-align:center; margin-bottom:8px; }
.hero-eyebrow { font-size:.7rem; letter-spacing:.28em; text-transform:uppercase; color:var(--teal-light); margin-bottom:10px; opacity:.85; }
.hero-title { font-size:clamp(1.8rem,6vw,2.6rem); font-weight:900; color:var(--white); letter-spacing:.04em; text-shadow:0 0 24px rgba(0,212,200,.5),0 2px 6px rgba(0,0,0,.4); line-height:1.15; }
.hero-title span { color:var(--teal); }
.hero-sub { margin-top:10px; font-size:.82rem; color:rgba(255,255,255,.65); line-height:1.7; }

.tool-card {
  width:100%; background:var(--card-bg); border:1px solid var(--card-border);
  border-radius:22px; padding:24px 22px; backdrop-filter:blur(12px);
  box-shadow:0 8px 40px rgba(0,0,0,.3),inset 0 1px 0 rgba(255,255,255,.15);
  text-decoration:none; display:block; transition:transform .2s, box-shadow .2s;
  position:relative; overflow:hidden;
}
.tool-card:hover { transform:translateY(-4px); box-shadow:0 14px 50px rgba(0,0,0,.4),0 0 40px rgba(0,212,200,.2),inset 0 1px 0 rgba(255,255,255,.2); }
.tool-card::before {
  content:''; position:absolute; inset:0;
  background:linear-gradient(110deg,transparent 40%,rgba(255,255,255,.06) 50%,transparent 60%);
  background-size:250% 100%; animation:cardSweep 4s ease-in-out infinite; pointer-events:none;
}
@keyframes cardSweep { 0%{background-position:-50% 0} 60%,100%{background-position:200% 0} }

.tool-icon { font-size:2.4rem; margin-bottom:12px; display:block; }
.tool-name { font-size:1.35rem; font-weight:900; color:var(--white); margin-bottom:6px; letter-spacing:.02em; }
.tool-name .accent { color:var(--teal); }
.tool-desc { font-size:.78rem; color:rgba(255,255,255,.6); line-height:1.7; margin-bottom:16px; }
.tool-cta {
  display:inline-flex; align-items:center; gap:6px;
  font-size:.8rem; font-weight:700; color:#1a1233;
  background:linear-gradient(135deg,var(--teal-light),var(--teal));
  padding:9px 20px; border-radius:30px;
  box-shadow:0 0 16px rgba(0,212,200,.4);
}
.tool-card.gold { border-color:rgba(255,215,0,.35); }
.tool-card.gold .tool-name .accent { color:#ffd700; }
.tool-card.gold .tool-cta { background:linear-gradient(135deg,#ffe066,#ffaa00); box-shadow:0 0 16px rgba(255,180,0,.4); }
.tool-card.gold:hover { box-shadow:0 14px 50px rgba(0,0,0,.4),0 0 40px rgba(255,215,0,.2),inset 0 1px 0 rgba(255,255,255,.2); }

.badge-new {
  position:absolute; top:16px; right:16px;
  font-size:.6rem; font-weight:900; letter-spacing:.1em;
  background:#ff3b6b; color:#fff; padding:3px 10px; border-radius:20px;
  box-shadow:0 0 12px rgba(255,59,107,.6); animation:badgePulse 1.5s ease-in-out infinite;
}
@keyframes badgePulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.1)} }

footer { font-size:.62rem; color:rgba(255,255,255,.4); text-align:center; line-height:1.9; margin-top:8px; }
</style>
</head>
<body>
<canvas id="sparkle-canvas"></canvas>
<div class="content">

  <div class="hero">
    <p class="hero-eyebrow">Hong Kong Mark Six · 香港六合彩</p>
    <h1 class="hero-title">六合彩<span>研究工具</span></h1>
    <p class="hero-sub">兩種數字排列研究法，分析頭獎號碼走勢<br>純屬娛樂教學，請理性投注</p>
  </div>

  <a class="tool-card" href="/gann">
    <span class="tool-icon">🌀</span>
    <div class="tool-name">江恩<span class="accent">螺旋方圖</span></div>
    <p class="tool-desc">傳統江恩螺旋排列法（以 01 為中心向外螺旋）。將兩個或以上紅色號碼連成直線或橫線，劃出金色預測範圍，並核實上期預測命中率。</p>
    <span class="tool-cta">開始研究 →</span>
  </a>

  <a class="tool-card gold" href="/fan">
    <span class="badge-new">NEW 新方法</span>
    <span class="tool-icon">🎯</span>
    <div class="tool-name">范氏<span class="accent">圖表</span></div>
    <p class="tool-desc">源自中國「九宮洛書盤」的全新研究法（7×7 洛書幻方，中心為 25=5²）。選一個「重心號碼」，向直、橫、斜八方放射，找出今期預測與上期頭獎的重疊號碼。</p>
    <span class="tool-cta">開始研究 →</span>
  </a>

  <footer>
    資料來源：香港賽馬會官方攪珠結果 ｜ 僅供參考及教學用途<br>
    范氏圖表方法由范氏朋友與強哥共同研究
  </footer>

</div>

<script>
(function(){
  const canvas=document.getElementById('sparkle-canvas');
  const ctx=canvas.getContext('2d');
  let W,H;
  function resize(){ W=canvas.width=window.innerWidth; H=canvas.height=window.innerHeight; }
  resize(); window.addEventListener('resize',resize);
  const COLORS=['#ffffff','#b8f7f5','#ffd700','#00d4c8','#ff9de2','#a78bfa','#5599ff','#44cc44'];
  class Sparkle{
    constructor(){ this.reset(true); }
    reset(init){
      this.x=Math.random()*W; this.y=init?Math.random()*H:H+10;
      this.size=Math.random()*3+0.5; this.opacity=0;
      this.maxOpacity=Math.random()*.8+.2; this.speed=Math.random()*.4+.1;
      this.drift=(Math.random()-.5)*.3; this.twinkleSpeed=Math.random()*.04+.01;
      this.twinkleOffset=Math.random()*Math.PI*2;
      this.color=COLORS[Math.floor(Math.random()*COLORS.length)];
      this.type=Math.random()<.6?'dot':'star';
      this.rotation=Math.random()*Math.PI*2; this.rotSpeed=(Math.random()-.5)*.05;
      this.life=0; this.maxLife=Math.random()*200+100;
    }
    update(t){
      this.life++; this.y-=this.speed; this.x+=this.drift; this.rotation+=this.rotSpeed;
      const tOp=this.maxOpacity*(.5+.5*Math.sin(t*this.twinkleSpeed+this.twinkleOffset));
      if(this.life<40) this.opacity=tOp*(this.life/40);
      else if(this.life>this.maxLife-40) this.opacity=tOp*((this.maxLife-this.life)/40);
      else this.opacity=tOp;
      if(this.life>this.maxLife||this.y<-10) this.reset(false);
    }
    draw(ctx){
      ctx.save(); ctx.globalAlpha=Math.max(0,this.opacity);
      ctx.translate(this.x,this.y); ctx.rotate(this.rotation); ctx.fillStyle=this.color;
      if(this.type==='dot'){
        ctx.beginPath(); ctx.arc(0,0,this.size,0,Math.PI*2); ctx.fill();
        ctx.globalAlpha=Math.max(0,this.opacity*.3);
        ctx.beginPath(); ctx.arc(0,0,this.size*2.5,0,Math.PI*2); ctx.fill();
      } else {
        const s=this.size*1.5;
        ctx.beginPath();
        ctx.moveTo(0,-s*2); ctx.lineTo(s*.4,-s*.4); ctx.lineTo(s*2,0);
        ctx.lineTo(s*.4,s*.4); ctx.lineTo(0,s*2); ctx.lineTo(-s*.4,s*.4);
        ctx.lineTo(-s*2,0); ctx.lineTo(-s*.4,-s*.4); ctx.closePath(); ctx.fill();
      }
      ctx.restore();
    }
  }
  const sparkles=Array.from({length:130},()=>new Sparkle());
  let t=0;
  function loop(){ ctx.clearRect(0,0,W,H); t++; sparkles.forEach(s=>{s.update(t);s.draw(ctx);}); requestAnimationFrame(loop); }
  loop();
})();
</script>
</body>
</html>
