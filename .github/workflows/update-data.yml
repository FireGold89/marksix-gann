name: Update Mark Six Data
on:
  # 自動排程暫時停用，待抓取格式驗證正確後再啟用
  # schedule:
  #   - cron: '30 14 * * 2,4,6'
  workflow_dispatch:   # 只允許手動觸發（測試用）

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Fetch latest Mark Six results
        run: node fetch-marksix.js
      - name: Commit & push if changed
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          if git diff --quiet data.json; then
            echo "No data changes"
          else
            git add data.json
            git commit -m "Auto-update Mark Six data"
            git push
          fi
