name: Update Mark Six Data
on:
  schedule:
    # 香港時間 (UTC+8) 週二/四/六晚 ~22:30 = UTC 14:30（攪珠21:30後一小時）
    - cron: '30 14 * * 2,4,6'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Fetch latest Mark Six results
        run: node fetch-marksix.js
      - name: Commit & push if changed
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          if git diff --quiet data.json; then
            echo "No data changes — nothing to deploy"
          else
            git add data.json
            git commit -m "Auto-update Mark Six data"
            git push
            echo "✓ Data updated — Vercel deploy will trigger automatically"
          fi
