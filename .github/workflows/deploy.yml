name: Deploy to Vercel
on:
  push:
    branches: [main]
  workflow_dispatch:

# 確保同時間只有一個部署，避免衝突
concurrency:
  group: vercel-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Vercel CLI
        run: npm install -g vercel
      - name: Deploy to Vercel
        run: vercel deploy --prod --yes --token=${{ secrets.VERCEL_TOKEN }}
